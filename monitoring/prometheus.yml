global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # LLM-NetAuto-SDN Application Metrics
  - job_name: 'llm-netauto'
    static_configs:
      - targets: ['host.docker.internal:9091']
    metrics_path: '/metrics'

  # ONOS Controller Metrics
  - job_name: 'onos'
    static_configs:
      - targets: ['onos:8181']
    metrics_path: '/onos/v1/metrics'
    basic_auth:
      username: 'onos'
      password: 'rocks'
    scheme: http

  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
